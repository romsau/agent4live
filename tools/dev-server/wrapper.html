<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>agent4live — UI dev</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0b0b0f;
        color: #888;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: row;
      }
      .sidebar {
        width: 220px;
        flex-shrink: 0;
        border-right: 1px solid #1a1a1a;
        padding: 28px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .sidebar h1 {
        font-size: 11px;
        font-weight: 500;
        color: #666;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .sidebar .hint {
        font-size: 9px;
        color: #3a3a3a;
        letter-spacing: 0.04em;
        margin-bottom: 18px;
      }
      .fixtures {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .fixture-row {
        background: transparent;
        border: 0;
        color: #5a5a5a;
        padding: 6px 10px;
        font-size: 11px;
        cursor: pointer;
        font-family: inherit;
        text-align: left;
        border-radius: 4px;
        transition: all 0.12s ease;
        letter-spacing: 0.01em;
        position: relative;
      }
      .fixture-row:hover {
        background: #131318;
        color: #ccc;
      }
      .fixture-row.active {
        background: #1a2922;
        color: #2ecc71;
      }
      .fixture-row.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 6px;
        bottom: 6px;
        width: 2px;
        background: #2ecc71;
        border-radius: 2px;
      }
      .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        position: relative;
      }
      .frame-wrap {
        width: 360px;
        height: 170px;
        border: 1px solid #262626;
        border-radius: 6px;
        overflow: hidden;
        position: relative;
      }
      .frame-wrap::after {
        content: '360 × 170 (jweb)';
        position: absolute;
        top: -22px;
        right: 0;
        font-size: 10px;
        color: #444;
        letter-spacing: 0.04em;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #1a1a1a;
      }
      .reload-flash {
        position: fixed;
        top: 24px;
        right: 24px;
        background: #2ecc71;
        color: #0a0a0a;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        letter-spacing: 0.04em;
      }
      .reload-flash.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <h1>agent4live</h1>
      <div class="hint">UI dev · auto-reloads</div>
      <div id="fixtures" class="fixtures"></div>
    </aside>
    <main class="main">
      <div class="frame-wrap">
        <iframe id="frame" src="/ui"></iframe>
      </div>
    </main>

    <div id="reload-flash" class="reload-flash">reloaded</div>

    <script>
      const fixturesEl = document.getElementById('fixtures');
      const frame = document.getElementById('frame');
      const flash = document.getElementById('reload-flash');

      async function loadFixtures() {
        const res = await fetch('/dev/fixtures');
        const { active, names } = await res.json();
        fixturesEl.textContent = '';
        names.forEach((name) => {
          const b = document.createElement('button');
          b.className = 'fixture-row';
          b.textContent = name;
          if (name === active) b.classList.add('active');
          b.onclick = () => switchFixture(name);
          fixturesEl.appendChild(b);
        });
      }

      async function switchFixture(name) {
        await fetch('/dev/fixture/' + encodeURIComponent(name), { method: 'POST' });
        reloadFrame();
        loadFixtures();
      }

      function reloadFrame() {
        frame.src = '/ui?t=' + Date.now();
      }

      // Dev-only escape hatch: certaines fixtures simulent un état UI piloté
      // par une var locale dans active.html (ex. `justInstalled` qui verrouille
      // le modal "Restart Live"). Plutôt que polluer le code de production
      // avec un bridge state→var, on inject directement la var dans le scope
      // de l'iframe une fois chargée. La prod ne renvoie jamais ces champs
      // donc l'effet est strictement contenu au dev server.
      frame.addEventListener('load', async () => {
        try {
          const res = await fetch('/ui/state');
          const state = await res.json();
          if (state.justInstalled) frame.contentWindow.justInstalled = true;
        } catch (_) {}
      });

      function showFlash() {
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 800);
      }

      const evt = new EventSource('/dev/events');
      evt.addEventListener('reload', () => {
        reloadFrame();
        loadFixtures();
        showFlash();
      });
      evt.addEventListener('full-reload', () => {
        location.reload();
      });

      loadFixtures();
    </script>
  </body>
</html>
